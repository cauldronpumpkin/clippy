syntax = "proto3";

package clippy.clipwire.v1;

option go_package = "clippy/internal/clipwire;clipwire";

enum PayloadType {
  PAYLOAD_TYPE_UNSPECIFIED = 0;
  PAYLOAD_TYPE_TEXT = 1;
  PAYLOAD_TYPE_URL = 2;
  PAYLOAD_TYPE_IMAGE = 3;
}

message ClipboardPayload {
  int64 timestamp_unix_ms = 1;
  PayloadType type = 2;
  bytes sha256 = 3;
  bytes data = 4;
  string mime_type = 5;
  uint64 size_bytes = 6;
}

message PayloadChunk {
  bytes transfer_id = 1;
  uint32 sequence = 2;
  uint32 total_chunks = 3;
  uint64 total_size = 4;
  bytes data = 5;
}
